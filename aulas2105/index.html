<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="estilo.css">
    <title>Formulários</title>
</head>
<body>
    <h1>Introdução a formulários</h1>
    <div class="conteudo-formulario">

        <form action="">
            <label for="pNome" > Nome: </label> 
            <input type="text" name="nome" id="pNome" placeholder="Digite seu nome:"> <br>

            <label for="sobreNome"> Sobrenome: </label> 
            <input type="text" name="sobrenome" id="sobreNome" placeholder="Digite seu sobrenome:">


            <h3>Selecione seu curso:</h3>

            <input type="radio" name="curso" id="tinf">
            <label for="tinf">Técnico em informática</label> <br>

            <input type="radio" name="curso" id="tcon">
            <label for="tcon">Técnico em contabilidade</label> <br>

            <input type="radio" name="curso" id="tele">
            <label for="tele">Técnico em eletrônica</label> <br>

            <input type="radio" name="curso" id="tadm">
            <label for="tadm" >Técnico em administração</label>


            <h3>Dados da plataforma:</h3>
            <label for="endEmail"> Email: </label>
            <input type="email" id="endEmail">

            <label for="senha">Defina uma senha: </label>
            <input type="password" id="senha" required>


            <div class="conteudo-disciplina">
                <h3>Escolha as disciplinas favoritas</h3>
                <input type="checkbox" id="port">
                <label for="port">Português</label>

                <input type="checkbox" id="mat">
                <label for="mat">Matemática</label>

                <input type="checkbox" id="lp2">
                <label for="lp2">Lab. Programação II</label>
            </div>


            <div class="conteudo-ano">
                <h3>Escolha o ano cursado</h3>
                <select id="ano-cursado">
                    <option value="pri">1º Ano</option>
                    <option value="seg">2º Ano</option>
                    <option value="ter">3º Ano</option>
                </select>
            </div>
            <p>Digite aqui a sua mensagem:</p>
            <textarea rows="2" cols="60"></textarea>
            <br>
            <button onclick="alert('teste')">Enviar dados</button>


        </form>

    </div>
</body>
</html>
